<!DOCTYPE html>
<html>
    <head>
        <title>Home page</title>
    
    <script>
        function validateMsg() {
            let name = document.getElementById("Name").value;
            let PhoneNumber = document.getElementById("Name").value;
            let Age = document.getElementById("Name").value;
            let Location = document.getElementById("Name").value;
            let email = document.getElementById("Name").value;

            if (name==""){
                alert("Enter your name");
            }else if(PhoneNumber==""){
                alert("Enter your Phone number");
            }else if(Age<18){
                alert("Age must be 18 or above");
            }else if(Location==""){
                alert("Enter your Location"); 
            }else if(email==""){
                alert("Enter your Email");
            }else{
                alert("Form submitted successfully");
            }
        }
    </script>
    </head>
    <body>
        <form>
            <label for="name">Name</label>
            <input type="text" id="name"><br><br>
            <label for="number">PhoneNumber</label>
            <input type="number" id="number" ><br>
            <label for="number">Age</label>
            <input type="number" id="number"><br>
            <label for="name">Location</label>
            <input type="text" id="name"><br>
            <label for="text">E-mail</label>
            <input type="email" id="text"><br>

            <button onclick="validateMsg()">Submit</button>
</form>
    </body>
</html>
