<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bank Account Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="bank.css">
<script src="bankscript.js"></script>

</head>

<body>

<div class="container-box">

<div class="header d-flex justify-content-between">

<div>
<h2>Bank Account</h2>
<h2>Registration Form</h2>
</div>

<div class="mt-3">
<h3>🏦 GREATBANK</h3>
</div>

</div>

<div class="p-4">

<form id="myForm">

<h4 class="section-title">Personal Information</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="name" >
<span id="nameErrorId" class="text-danger"></span>
</div>

<div class="col-md-6 mb-3">
<label>Date of Birth <span class="text-danger">*</span>:</label>
<input type="date" class="form-control" id="dob">
<span id="DateOfBirthErrorId" class="text-danger"></span>
</div>

<div class="col-md-6 mb-3">
<label>Phone Number <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="phone">
<span id="PhoneNumberErrorId" class="text-danger"></span>
</div>

<div class="col-md-6 mb-3">
<label>Email Address <span class="text-danger">*</span>:</label>
<input type="email" class="form-control" id="email">
<span id="EmailErrorId" class="text-danger"></span>
</div>

<div class="col-12 mb-3">
<label>Address <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="address">
<span id="AddressErrorId" class="text-danger"></span>
</div>

</div>

<h4 class="section-title">Identification Information</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label>ID Type <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="idtype">
<span id="IdTypeErrorId" class="text-danger"></span>
</div>

<div class="col-md-6 mb-3">
<label>ID Number <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="idnumber">
<span id="IdNumberErrorId" class="text-danger"></span>
</div>

</div>

<h4 class="section-title">Account Information</h4>

<div class="row">

<div class="col-md-6">

<label>Account Type <span class="text-danger">*</span>:</label>

<div class="mt-2">

<input type="radio" name="account" value="Savings"> Savings

<input type="radio" name="account" value="Checking" class="ms-3"> Checking
<span id="AccoutTypeErrorId" class="text-danger"></span>

</div>

</div>

<div class="col-md-6">

<label>Initial Deposit <span class="text-danger">*</span>:</label>
<input type="number" class="form-control" id="deposit">
<span id="InitialDepositErrorId" class="text-danger"></span>

</div>

</div>

<p class="footer-text">

I hereby confirm that the information provided is accurate to the best of my knowledge. I also agree to abide by the bank's terms and conditions.

</p>

<div class="row">

<div class="col-md-6 mb-3">
<label>Signature <span class="text-danger">*</span>:</label>
<input type="text" class="form-control" id="signature">
<span id="SignatureErrorId" class="text-danger"></span>
</div>

<div class="col-md-6 mb-3">
<label>Date <span class="text-danger">*</span>:</label>
<input type="date" class="form-control" id="date">
<span id="DateErrorId" class="text-danger"></span>
</div>

</div>

<div class="text-center mt-4">

<button onclick="validate()" type="submit" class="btn btn-primary px-5">
Submit
</button>

</div>

</form>

</div>

</div>



</body>
</html>
